<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Jacket Masters</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'"><noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
    <link rel="stylesheet" href="style.css">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; background: #0a0a0a; color: #fff; }
        .checkout-container { flex: 1; padding: 100px 5%; max-width: 800px; margin: 0 auto; width: 100%; position: relative; }
        .checkout-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 30px; text-align: center; }
        
        .checkout-box { background: rgba(25, 25, 25, 0.6); padding: 40px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #ccc; }
        .form-group input, .form-group select { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 6px; font-family: 'Montserrat', sans-serif; }
        .form-row { display: flex; gap: 20px; }
        .form-row .form-group { flex: 1; }
        
        .section-title { font-size: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 20px; margin-top: 30px; color: var(--text-color, #ff6a00); }
        
        .payment-methods { display: flex; flex-direction: column; gap: 15px; }
        .payment-method { display: flex; align-items: center; gap: 10px; padding: 15px; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; cursor: pointer; }
        .payment-method:hover { border-color: rgba(255,255,255,0.5); }
        .payment-method input[type="radio"] { width: auto; margin: 0; }
        
        .submit-btn { display: block; width: 100%; text-align: center; background: #fff; color: #000; padding: 15px; border-radius: 8px; font-weight: 600; text-decoration: none; margin-top: 30px; border: none; cursor: pointer; transition: 0.3s; font-family: 'Montserrat', sans-serif; font-size: 1.1rem; }
        .submit-btn:hover { background: #eee; transform: translateY(-2px); }
        
        .success-message { text-align: center; padding: 50px; display: none; }
        .success-message i { font-size: 4rem; color: #4cd137; margin-bottom: 20px; }
        
    </style>
</head>
<body class="theme-black">
    <div class="bg-glow"></div>

    <header class="main-header">
        <div class="logo">
            <a href="index.html" style="text-decoration:none; color:inherit;">
                <span class="logo-bold">JACKET</span><span>MASTERS</span>
            </a>
        </div>
    </header>

    <main class="checkout-container">
        
        <div id="checkout-form-container" class="checkout-box">
            <h1 class="checkout-title">Complete Your Order</h1>
            <form id="checkout-form">
                
                <h3 class="section-title">Shipping Details</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="fname" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="lname" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Shipping Address</label>
                    <input type="text" id="address" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" id="city" required>
                    </div>
                    <div class="form-group">
                        <label>Postal Code</label>
                        <input type="text" id="zip" required>
                    </div>
                </div>

                <h3 class="section-title">Payment Method</h3>
                <div class="payment-methods" id="payment-methods-container">
                    <div style="color:#aaa;">Loading payment options...</div>
                </div>

                <button type="submit" class="submit-btn" id="place-order-btn" disabled>Place Order Now</button>
            </form>
        </div>

        <div id="success-container" class="checkout-box success-message">
            <i class="fa-solid fa-circle-check"></i>
            <h2>Order Placed Successfully!</h2>
            <p style="color:#aaa; margin-top: 10px;">Your order has been recorded. Check your email for confirmation.</p>
            <a href="index.html" class="submit-btn" style="max-width: 200px; margin: 30px auto 0;">Return Home</a>
        </div>

    </main>

    <script type="module" src="checkout.js"></script>
</body>
</html>
